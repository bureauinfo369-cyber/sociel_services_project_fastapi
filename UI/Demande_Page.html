<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطلبات</title>
    <link rel="stylesheet" href="/static/assets/css/style.css">
    <link rel="icon" href="/static/assets/img/checklist.png" type="image/x-icon">
    <style>
        
    </style>
</head>
<body>
    <nav class="navbar " style="margin-bottom: 15px;">
            <div>
                <a href="/">الطلبات 📋</a>
            </div>
            <div>
                <a href="/employees-page">الموظفون 👨🏻‍💼</a>
            </div>

    </nav>
    <div class="notification" id="notification"></div>

    <div class="fileds">
    <div class="grid">
        <!-- search_demande_id -->
        <div>
            <label for="search_demande_id">رقم الطلب</label>
            <input 
                type="text" 
                id="search_demande_id" 
                placeholder="رقم الطلب" 
            />
        </div>

        <div>
            <label for="search_NumCompte">رقم الحساب</label>
            <input 
                type="text" 
                id="search_NumCompte" 
                placeholder="رقم الحساب" 
            />
        </div>

        <!-- search_type_prestation -->
        <div >
            <label for="search_type_prestation">نوع الطلب</label>
            <input 
                type="text" 
                id="search_type_prestation" 
                placeholder="نوع الطلب" 
                list="list_search_type_prestation" 
                 style="cursor: pointer;"
            />
            <datalist id="list_search_type_prestation">
                <option value="قرض تقسيط">
                <option value="قرض مالي">
                <option value="ختان">
                <option value="زواج">
                <option value="مرض">
                <option value="العمرة">
                <option value="منحة مختلفة">
            </datalist>
        </div>
        <div>
            <label for="">الإبن</label>
            <input 
                type="text" 
                id="" 
                placeholder="الإبن" 
            />
        </div>
        <!--  -->
        <div class="md:col-span-2">
  <label for="Attachments">المرفقات</label>

  <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
    <input
      type="text"
      id="Attachments"
      placeholder="اختر/اكتب ثم اضغط Enter أو زر +"
      list="list_Attachments"
      style="cursor:pointer; min-width: 220px;"
    />

    <button type="button" id="addAttachment" style="cursor:pointer;">+</button>
  </div>

  <div id="attachmentsChips" style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;"></div>

  <input type="hidden" name="attachments" id="attachmentsHidden" value="">
</div>

<datalist id="list_Attachments">
  <option value="شهادة طبية">
  <option value="شهادة عائلية">
    <option value="شهادة ميلاد">
  <option value="نسخة من الدفتر العائلي">
  <option value="شهادة وفاة">
</datalist>
        <!-- search_gestion -->
        <div>
            <!-- Step 1: Choose the mode -->
<label for="modeSelect">اختر نمط ادخال التاريخ :</label>
<select id="modeSelect">
    <option value="full-date">تاريخ كامل (يوم,شهر,سنة)</option>
    <option value="month-year">شهر و سنة</option>
</select>

<br><br>

<!-- Step 2: The dynamic input and container -->
<label id="inputLabel" for="search_gestion">اختر:</label>
<span id="inputContainer">
    <!-- JavaScript will swap the elements inside here -->
    <input type="date" id="search_gestion">
</span>
        </div>

        <!-- search_periode_deduction -->
        <div>
            <label for="search_periode_deduction">مدة التسديد</label>
            <input 
                type="text" 
                id="search_periode_deduction" 
                placeholder="المدة" 
            />
        </div>
        
        <div >
            <label for="Account">حساب</label>
            <input 
                type="text" 
                id="Account" 
                placeholder="حساب" 
                list="list_Account" 
                 style="cursor: pointer;" oninput="Change_account()"
            />
            <datalist id="list_Account">
                <option value="CCP">
                <option value="BNA">
                <option value="BDL">
                <option value="CPA">
                <option value="TRS">
                    <option value="BADR">
                
            </datalist>
        </div>

        <!-- search_Montante -->
        <div>
            <label for="search_montante">المبلغ</label>
            <input 
                type="text" 
                id="search_montante" 
                placeholder="0.00" 
            />
        </div>

        <!-- search_statut -->
        <div class="md:col-span-2">
            <label for="search_statut">حالة الطلب</label>
            <input 
                type="text" 
                id="search_statut" 
                placeholder="الحالة" 
                list="list_search_statut" 
                style="cursor: pointer;"
            />
            <datalist id="list_search_statut">
                
                <option value="قيد الدراسة">
                <option value="قيد التسديد">
                <option value="مرفوض ">
                <option value="مسدد">
            </datalist>
        </div>         
    </div>
<!-- Buttons -->
    <div class="flex gap-3 flex-wrap mt-4">
        <button 
            id="searchBtn" 
            class="bg-purple-600 active:bg-purple-600 hover:bg-purple-700"
        >
            بحث 🔍
        </button>
        
        <button 
            onclick="clearSearch()"
            class="bg-white border border-gray-300 hover:bg-gray-100"
        >
            تفريغ
        </button>
        
        <button 
            id="addBtn"
            class="bg-green-600 active:bg-green-600 hover:bg-green-700"
        >
            إضافة طلب ➕
        </button>
        <button 
            id="printbtn1"
            class="bg-green-600 active:bg-green-600 hover:bg-green-700"
        >
           طباعة النفقات  🖨️
        </button>
        <button 
            id="printbtn2"
            class="bg-green-600 active:bg-green-600 hover:bg-green-700"
        >
           طباعة قائمة المعنين بالخصم  🖨️
        </button>
    </div>

</div>

    
    <div class="container">
        <h1>الطلبات المسجلة</h1>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>جاري إنشاء ملف PDF...</p>
        </div>
        
        <table id="demandesTable">
            <thead>
                <tr>
                    <th>رقم الطلب</th>
                    <th>اسم الموظف</th>
                    <th>الحساب</th>
                    <th>نوع الطلب</th>
                    <th>السنة</th>
                    <th>المدة</th>
                    <th>البداية</th>
                    <th>المبلغ</th>
                    <th>المرفقات</th>
                    <th>حالة الطلب</th>
                    <th>حذف</th>
                    <th>طباعة</th>


                </tr>
            </thead>
            <tbody id="demandesTableBody">
                <!-- Data will be inserted here -->
            </tbody>
        </table>
    </div>
    <footer class="fotter " style="margin-top: 15px;">
        <div>
            <p>جميع الحقوق محفوظة لفريق التطوير CHIBM-11</p>
        </div>
        <div>
            <a href=""> contact us </a>
        </div>

    </footer>

    
    
    
    <script src="/static/assets/controle/controle_demande.js?v=2"></script>
    
</body>
</html>
