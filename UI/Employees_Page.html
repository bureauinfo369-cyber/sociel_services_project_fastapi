<!DOCTYPE html>

    <nav class="navbar " style="margin-bottom: 15px;">

    <div class="fileds">
    <div class="grid">
        <!-- NumCompte -->
        <div>
            <label for="NumCompte">رقم الحساب</label>
            <input 
                type="text" 
                id="NumCompte" 
                placeholder="رقم الحساب" 
            />
        </div>

        <div>
            <label for="Nom">الإسم واللقب</label>
            <input 
                type="text" 
                id="Nom" 
                placeholder="الإسم و اللقب" 
            />
        </div>

        <div>
            <label for="Grade">الرتبة</label>
            <input 
                type="text" 
                id="Grade" 
                placeholder="الرتبة" 
            />
        </div>
        <div>
            <label for="Poste">الوظيفة</label>
            <input 
                type="text" 
                id="Poste" 
                placeholder="الوظيفة" 
            />
        </div>

        <div>
            <label for="residence_admin">الإقامة الإدارية</label>

        <div>

            <input 
                type="text" 
                id="lieu_de_travail" 
                placeholder="مقر العمل" 
            />
        </div>
        

    </div>
<!-- Buttons -->
    <div class="flex gap-3 flex-wrap mt-4">

            id="searchBtn" 
            class="bg-purple-600 active:bg-purple-600 hover:bg-purple-700"
        >
            بحث 🔍
        </button>
        
        <button 
            onclick="clearSearch()"
            class="bg-white border border-gray-300 hover:bg-gray-100"
        >
            تفريغ
        </button>
        
        <button 
            id="addBtn"
            class="bg-green-600 active:bg-green-600 hover:bg-green-700"
        >
            إضافة موظف ➕
        </button>
    </div>

</div>
